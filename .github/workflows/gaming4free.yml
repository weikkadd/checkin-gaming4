name: Game4Free-Renew
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'
jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: write
      contents: read
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            xdotool \
            wget \
            unzip

      - name: 🌐 安装 Chrome 和 Chromedriver (版本匹配)
        run: |
          # 获取已安装的 Chrome 版本
          CHROME_VERSION=$(google-chrome --version | awk '{print $3}')
          echo "[INFO] Chrome 版本: $CHROME_VERSION"
          
          # 下载匹配的 Chromedriver
          CHROMEDRIVER_URL="https://storage.googleapis.com/chrome-for-testing-public/${CHROME_VERSION}/linux64/chromedriver-linux64.zip"
          echo "[INFO] 下载 Chromedriver: $CHROMEDRIVER_URL"
          
          wget -q "$CHROMEDRIVER_URL" -O chromedriver.zip
          unzip -q chromedriver.zip
          sudo mv chromedriver-linux64/chromedriver /usr/local/bin/
          sudo chmod +x /usr/local/bin/chromedriver
          
          # 验证 Chromedriver
          CHROMEDRIVER_VERSION=$(chromedriver --version)
          echo "[INFO] Chromedriver 版本: $CHROMEDRIVER_VERSION"
          
          # 设置环境变量
          export PATH="/usr/local/bin:$PATH"

      - name: 🐍 安装 Python 依赖
        working-directory: gaming4free-renew
        run: |
          pip install seleniumbase

      - name: 🔗 设置代理 (sing-box, 家宽节点)
        continue-on-error: true
        env:
          NODE_LINK: ${{ secrets.PROXY_URL }}
        run: |
          if [ -n "$NODE_LINK" ]; then
            PROTO=$(echo "$NODE_LINK" | cut -d':' -f1)
            echo "[INFO] PROXY_URL 协议: $PROTO"
            bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)
            # 【修复】等待代理启动
            sleep 3
            # 验证代理是否可用
            if curl -x "socks5://127.0.0.1:1080" --max-time 5 -s https://api.ipify.org > /dev/null 2>&1; then
              echo "[INFO] 代理启动成功"
              echo "IS_PROXY=true" >> $GITHUB_ENV
              echo "PROXY_SERVER=socks5://127.0.0.1:1080" >> $GITHUB_ENV
              echo "代理出口 IP:"
              curl -x "socks5://127.0.0.1:1080" -s https://api.ipify.org
              echo
            else
              echo "[ERROR] 代理启动失败，将使用直连模式"
              echo "IS_PROXY=false" >> $GITHUB_ENV
              echo "PROXY_SERVER=" >> $GITHUB_ENV
            fi
          else
            echo "[WARN] PROXY_URL 未配置, 使用直连模式"
            echo "IS_PROXY=false" >> $GITHUB_ENV
            echo "PROXY_SERVER=" >> $GITHUB_ENV
          fi

      - name: 🔧 验证代理连接
        run: |
          echo "代理配置: IS_PROXY=${IS_PROXY}, PROXY_SERVER=${PROXY_SERVER}"
          if [ "${IS_PROXY}" = "true" ]; then
            echo "[INFO] 测试代理连接..."
            curl -x "$PROXY_SERVER" -s --max-time 10 https://api.ipify.org && echo
          else
            echo "[WARN] 代理未启用，使用直连"
            curl -s --max-time 10 https://api.ipify.org && echo
          fi

      - name: 🚀 运行续期脚本
        env:
          PYTHONIOENCODING: utf-8
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GAME4FREE_ACCOUNT: ${{ secrets.GAME4FREE_ACCOUNT }}
          GAME4FREE_COOKIE: ${{ secrets.GAME4FREE_COOKIE }}
          IS_PROXY: ${{ env.IS_PROXY }}
          PROXY_SERVER: ${{ env.PROXY_SERVER }}
        working-directory: gaming4free-renew
        run: |
          echo "代理状态: IS_PROXY=${IS_PROXY:-false}, PROXY_SERVER=${PROXY_SERVER:-无}"
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python renew.py

      # 【修复】上传路径改为 debug_output/, 与脚本中的 SCREENSHOT_DIR 一致
      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: gaming4free-renew/debug_output/
          if-no-files-found: warn
          retention-days: 3
